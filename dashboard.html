<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — EMPS</title>
<link rel="stylesheet" href="styles.css" />
<style>
.db-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  margin-bottom: 1.5rem;
}

.kpi {
  background: var(--surface);
  padding: 1.5rem 1.75rem;
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--kpi-color, var(--accent));
}
.kpi-label {
  font-family: var(--font-d); font-size: .7rem; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted);
  margin-bottom: .6rem;
}
.kpi-value {
  font-family: var(--font-d); font-size: 2.6rem; font-weight: 700;
  line-height: 1; color: var(--text); letter-spacing: .02em;
}
.kpi-sub {
  font-family: var(--font-m); font-size: .72rem; color: var(--text-muted);
  margin-top: .5rem;
}
.kpi-trend {
  position: absolute; top: 1.25rem; right: 1.25rem;
  font-family: var(--font-m); font-size: .7rem;
  padding: .15rem .45rem; border-radius: 999px;
}
.kpi-trend.up   { background: var(--green-dim); color: var(--green); }
.kpi-trend.warn { background: var(--orange-dim); color: var(--orange); }

/* Mid row */
.mid-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

/* Department bars */
.dept-list { display: flex; flex-direction: column; gap: .8rem; margin-top: 1rem; }
.dept-row { }
.dept-hd { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .3rem; }
.dept-name { font-size: .85rem; font-weight: 600; }
.dept-count { font-family: var(--font-m); font-size: .78rem; color: var(--text-muted); }
.dept-track { height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.dept-fill {
  height: 100%; background: var(--accent); border-radius: 999px;
  width: 0; transition: width 1s cubic-bezier(.2,.8,.3,1);
}

/* Leave status */
.leave-rows { display: flex; flex-direction: column; gap: .65rem; margin-top: 1rem; }
.leave-row { display: flex; align-items: center; gap: .75rem; }
.leave-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.leave-row-label { font-size: .85rem; flex: 1; }
.leave-row-bar-wrap { flex: 2; height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.leave-row-bar { height: 100%; border-radius: 999px; width: 0; transition: width 1s cubic-bezier(.2,.8,.3,1); }
.leave-row-count { font-family: var(--font-m); font-size: .78rem; color: var(--text-muted); min-width: 28px; text-align: right; }

/* Recent table section */
.section-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.section-title {
  font-family: var(--font-d); font-size: 1rem; font-weight: 600;
  letter-spacing: .07em; text-transform: uppercase;
}

/* Leave util ring */
.util-ring-wrap { display: flex; align-items: center; gap: 1.5rem; margin-top: 1.25rem; }
.ring { width: 80px; height: 80px; flex-shrink: 0; }
.ring circle { fill: none; stroke-width: 6; transition: stroke-dashoffset 1s cubic-bezier(.2,.8,.3,1); }
.ring .track { stroke: var(--surface-2); }
.ring .fill  { stroke: var(--accent); stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; }
.util-label h3 { font-family: var(--font-d); font-size: 1.5rem; font-weight: 700; color: var(--text); }
.util-label p  { font-size: .82rem; color: var(--text-muted); margin-top: .2rem; }

/* Salary sparkline (CSS only) */
.payroll-visual { margin-top: 1.25rem; }
.payroll-bars { display: flex; align-items: flex-end; gap: 3px; height: 48px; }
.pb { flex: 1; border-radius: 3px 3px 0 0; background: var(--accent-dim); min-height: 4px; transition: height .5s ease; }

/* Loading state */
.db-loading { text-align: center; padding: 4rem 0; }

@media (max-width: 900px) {
  .db-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .db-grid { grid-template-columns: 1fr; }
  .mid-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="main-nav">
  <a href="/" class="nav-logo">EMP<span>S</span></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/dashboard.html" class="active">Dashboard</a></li>
    <li><a href="/employees.html">Employees</a></li>
    <li><a href="/article.html">Article</a></li>
  </ul>
</nav>

<header class="page-hd">
  <div style="max-width:1400px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <p class="page-sub">Workforce intelligence overview — live data</p>
    </div>
    <a href="/employees.html" class="btn btn-primary btn-sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Employee
    </a>
  </div>
</header>

<div class="main-c">
  <div id="dbContent">
    <div class="db-loading"><div class="spinner"></div></div>
  </div>
</div>

<div id="toasts"></div>

<script>
/* ─── Utils ─── */
function fmt(n, style = 'decimal', fraction = 0) {
  if (n == null) return '—';
  return new Intl.NumberFormat('en-US', { style, minimumFractionDigits: fraction, maximumFractionDigits: fraction,
    ...(style === 'currency' ? { currency: 'USD' } : {}) }).format(n);
}

function counter(el, end, duration = 900) {
  let start = 0, startTime = null;
  const isCurrency = el.dataset.currency === '1';
  function step(ts) {
    if (!startTime) startTime = ts;
    const p = Math.min((ts - startTime) / duration, 1);
    const v = Math.round(start + (end - start) * (1 - Math.pow(1 - p, 3)));
    el.textContent = isCurrency ? '$' + v.toLocaleString() : v.toLocaleString();
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function leaveLabel(s) {
  return ['No Request', 'Pending', 'Approved', 'Rejected'][s] ?? 'Unknown';
}

/* ─── Render ─── */
function render(d) {
  const maxDept = d.departments.length ? Math.max(...d.departments.map(x => x.count)) : 1;
  const leaveData = [
    { label: 'No Request', count: d.noLeaveRequest,  color: 'var(--text-faint)' },
    { label: 'Pending',    count: d.pendingLeaves,   color: 'var(--orange)' },
    { label: 'Approved',   count: d.approvedLeaves,  color: 'var(--green)' },
    { label: 'Rejected',   count: d.rejectedLeaves,  color: 'var(--red)' },
  ];
  const maxLeave = Math.max(...leaveData.map(x => x.count), 1);

  const circumference = 2 * Math.PI * 30;
  const offset = circumference - (d.leaveUtilizationPct / 100) * circumference;

  const deptBars = d.departments.length
    ? d.departments.slice(0, 8).map(dep => `
      <div class="dept-row">
        <div class="dept-hd">
          <span class="dept-name">${dep.name}</span>
          <span class="dept-count">${dep.count}</span>
        </div>
        <div class="dept-track"><div class="dept-fill" data-w="${Math.round((dep.count / maxDept) * 100)}"></div></div>
      </div>`).join('')
    : '<p class="text-m text-sm">No department data.</p>';

  const leaveRows = leaveData.map(l => `
    <div class="leave-row">
      <div class="leave-dot" style="background:${l.color}"></div>
      <div class="leave-row-label">${l.label}</div>
      <div class="leave-row-bar-wrap"><div class="leave-row-bar" data-w="${Math.round((l.count / maxLeave) * 100)}" style="background:${l.color}"></div></div>
      <div class="leave-row-count">${l.count}</div>
    </div>`).join('');

  const recentRows = d.recentEmployees.length
    ? d.recentEmployees.map(e => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:.6rem;">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:.7rem;color:var(--accent);flex-shrink:0">${initials(e.name)}</div>
            <span style="font-weight:600">${e.name}</span>
          </div>
        </td>
        <td class="text-mono" style="color:var(--text-muted)">#${String(e.employeeId).padStart(4,'0')}</td>
        <td>${e.department}</td>
        <td style="color:var(--text-muted)">${e.role}</td>
        <td class="text-mono">${fmt(e.salary, 'currency')}</td>
        <td>${statusBadge(e.leaveStatus)}</td>
        <td><span class="badge ${e.isActive ? 'badge-active' : 'badge-inactive'}">${e.isActive ? 'Active' : 'Inactive'}</span></td>
      </tr>`).join('')
    : `<tr><td colspan="7" style="text-align:center;padding:2.5rem;color:var(--text-muted)">No employees yet. <a href="/employees.html" style="color:var(--accent)">Add one</a>.</td></tr>`;

  document.getElementById('dbContent').innerHTML = `
    <!-- KPI Cards -->
    <div class="db-grid anim anim-1">
      <div class="kpi" style="--kpi-color:var(--accent)">
        <div class="kpi-label">Total Employees</div>
        <div class="kpi-value" data-val="${d.total}" id="kpiTotal">0</div>
        <div class="kpi-sub">${d.inactive} inactive</div>
      </div>
      <div class="kpi" style="--kpi-color:var(--green)">
        <div class="kpi-label">Active Headcount</div>
        <div class="kpi-value" data-val="${d.active}" id="kpiActive">0</div>
        <div class="kpi-sub">${d.departments.length} dept${d.departments.length !== 1 ? 's' : ''}</div>
        <div class="kpi-trend up">↑ In service</div>
      </div>
      <div class="kpi" style="--kpi-color:var(--orange)">
        <div class="kpi-label">Pending Leaves</div>
        <div class="kpi-value" data-val="${d.pendingLeaves}" id="kpiLeave">0</div>
        <div class="kpi-sub">${d.approvedLeaves} approved this cycle</div>
        ${d.pendingLeaves > 0 ? '<div class="kpi-trend warn">! Review needed</div>' : ''}
      </div>
      <div class="kpi" style="--kpi-color:var(--blue)">
        <div class="kpi-label">Monthly Payroll</div>
        <div class="kpi-value text-sm" data-val="${Math.round(d.totalMonthlyPayroll)}" data-currency="1" id="kpiPayroll">$0</div>
        <div class="kpi-sub">across ${d.active} employees</div>
      </div>
    </div>

    <!-- Mid row -->
    <div class="mid-row">
      <!-- Departments -->
      <div class="card anim anim-2">
        <div class="section-hd">
          <span class="section-title">By Department</span>
          <span class="text-m text-sm">${d.departments.length} dept${d.departments.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="dept-list">${deptBars}</div>
      </div>

      <!-- Leave status + utilization -->
      <div class="card anim anim-3">
        <div class="section-hd">
          <span class="section-title">Leave Status</span>
          <span class="text-m text-sm">${d.active} active staff</span>
        </div>
        <div class="leave-rows">${leaveRows}</div>
        <div class="util-ring-wrap" style="margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)">
          <svg class="ring" viewBox="0 0 70 70">
            <circle class="track" cx="35" cy="35" r="30"/>
            <circle class="fill" cx="35" cy="35" r="30" id="ringFill"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${circumference}"/>
          </svg>
          <div class="util-label">
            <h3 id="utilPct">0%</h3>
            <p>Leave utilization</p>
            <p style="margin-top:.4rem">${d.totalLeavesTaken} / ${d.totalLeavesAllowed} days used</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent employees -->
    <div class="card anim anim-4">
      <div class="section-hd">
        <span class="section-title">Recent Employees</span>
        <a href="/employees.html" class="btn btn-secondary btn-sm">View all →</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>ID</th><th>Department</th><th>Role</th>
              <th>Salary</th><th>Leave</th><th>Status</th>
            </tr>
          </thead>
          <tbody>${recentRows}</tbody>
        </table>
      </div>
    </div>
  `;

  // Animate KPI counters
  requestAnimationFrame(() => {
    ['kpiTotal', 'kpiActive', 'kpiLeave', 'kpiPayroll'].forEach(id => {
      const el = document.getElementById(id);
      if (el) counter(el, Number(el.dataset.val));
    });

    // Dept bars
    document.querySelectorAll('.dept-fill').forEach(el => {
      setTimeout(() => { el.style.width = el.dataset.w + '%'; }, 100);
    });

    // Leave bars
    document.querySelectorAll('.leave-row-bar').forEach(el => {
      setTimeout(() => { el.style.width = el.dataset.w + '%'; }, 150);
    });

    // Ring animation
    setTimeout(() => {
      const ring = document.getElementById('ringFill');
      if (ring) ring.style.strokeDashoffset = String(circumference - (d.leaveUtilizationPct / 100) * circumference);
      const pctEl = document.getElementById('utilPct');
      if (pctEl) {
        let start = 0, end = d.leaveUtilizationPct, t0 = null;
        function tick(ts) {
          if (!t0) t0 = ts;
          const p = Math.min((ts - t0) / 900, 1);
          pctEl.textContent = Math.round(start + (end - start) * (1 - Math.pow(1 - p, 3))) + '%';
          if (p < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }
    }, 200);
  });
}

function initials(name) {
  return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function statusBadge(s) {
  const map = { 0: ['badge-none', 'None'], 1: ['badge-pending', 'Pending'], 2: ['badge-approved', 'Approved'], 3: ['badge-rejected', 'Rejected'] };
  const [cls, label] = map[s] ?? ['badge-none', 'Unknown'];
  return `<span class="badge ${cls}">${label}</span>`;
}

async function loadDashboard() {
  try {
    const r = await fetch('/api/stats');
    if (!r.ok) throw new Error('API error');
    const d = await r.json();
    render(d);
  } catch (err) {
    document.getElementById('dbContent').innerHTML =
      `<div style="text-align:center;padding:4rem 0;color:var(--text-muted)">Failed to load dashboard data. Is the database connected?</div>`;
  }
}

loadDashboard();
</script>
</body>
</html>
